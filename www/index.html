<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Roulette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="src/css/common.css">
    <link rel="stylesheet" href="src/css/index.css">
    
    <script type="importmap">
    {
        "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js"
        }
    }
    </script>
    <!-- ✅ FIX: profile.js ELIMINADO. Ya no se usa Spotify OAuth por usuario. -->
    <script src="src/profile.js" type="module"></script> 
    <script type="module" src="src/lobby.js"></script>
</head>
<body>
    <header>
        <a href="index.html"><h1>Music Roulette</h1></a>
    </header>

    <main class="container text-center">
        <form>
            <div class="row g-3">
                <div>
                    <h2>Name</h2>
                    <input type="text" name="nombre" id="nombre">
                </div>
                <div>
                    <h2>Room ID</h2>
                    <input type="text" name="id_room" id="id_room">
                </div>
                <div class="d-grid gap-2 d-md-block">
                    <button id="unirse" type="button" class="btn btn-primary btn-lg">
                        Join Room
                    </button>
                    <button id="btn-crear-sala" type="button" class="btn btn-success btn-lg">Create Room</button>
                </div>
                <h3 id="mensaje-sala" style="display: none;">
                    Room code: <strong id="codigo-sala"></strong>
                </h3>
            </div>
        </form>
    </main>

    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
